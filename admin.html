<!DOCTYPE html>
<html>
<head>
  <title>High Command Panel</title>
</head>
<body style="background:black;color:#00ff88;font-family:monospace;text-align:center;">

<h1>High Command Approval Panel</h1>
<div id="pendingList"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = "https://zmnolzsssbzexpzvsjva.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inptbm9senNzc2J6ZXhwenZzanZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NTQ5NzgsImV4cCI6MjA4NzUzMDk3OH0.TrwfKUzzzDfQ5CZn1VzAyktyddYyfNlrTli_UbRqFu4";

const client = createClient(SUPABASE_URL, SUPABASE_KEY);

const container = document.getElementById("pendingList");

async function init() {
  const { data: sessionData } = await client.auth.getSession();

  if (!sessionData.session) {
    container.innerHTML = "Not logged in.";
    return;
  }

  const userId = sessionData.session.user.id;

  // Check if current user exists in officers
  const { data: officer } = await client
    .from("officers")
    .select("*")
    .eq("id", userId)
    .single();

  if (!officer) {
    container.innerHTML = "Officer record not found.";
    return;
  }

  // Only allow approved officers to view admin panel
  if (!officer.approved) {
    container.innerHTML = "Access denied.";
    return;
  }

  loadPending();
}

async function loadPending() {
  const { data } = await client
    .from("officers")
    .select("*")
    .eq("approved", false);

  container.innerHTML = "";

  if (!data || data.length === 0) {
    container.innerHTML = "No pending officers.";
    return;
  }

  data.forEach(officer => {
    const div = document.createElement("div");
    div.innerHTML = `
      ${officer.id}
      <button onclick="approve('${officer.id}')">Approve</button>
    `;
    container.appendChild(div);
  });
}

window.approve = async function (id) {
  await client
    .from("officers")
    .update({ approved: true })
    .eq("id", id);

  loadPending();
};

init();
</script>

</body>
</html>
